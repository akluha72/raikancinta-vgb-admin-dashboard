name: Deploy to Hostinger

# Build the Laravel app on CI (shared hosting can't reliably run composer/npm),
# then ship the finished artifact to Hostinger over SSH/rsync.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SSH_PRIVATE_KEY  - private key whose public half is in Hostinger ~/.ssh/authorized_keys
#   SSH_HOST         - e.g. 123.45.67.89  (or your domain)
#   SSH_USER         - Hostinger SSH username (shown in hPanel → Advanced → SSH Access)
#   SSH_PORT         - Hostinger SSH port (shared is usually 65002)
#   DEPLOY_PATH      - absolute path on the server, e.g. /home/u123456789/domains/vgb2.raikancinta.com/admin
#
# Migrations are NOT run automatically. After a deploy that needs them, run by hand:
#   ssh -p <port> <user>@<host> "cd <DEPLOY_PATH> && php artisan migrate --force"

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never interrupt an in-flight deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, gd, pdo_mysql, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Install & build frontend
        run: |
          npm ci
          npm run build

      # Optional gate: uncomment to block deploys when tests fail. Runs against
      # an sqlite in-memory DB so it needs no server credentials.
      # - name: Run tests
      #   env:
      #     DB_CONNECTION: sqlite
      #     DB_DATABASE: ':memory:'
      #   run: |
      #     cp .env.example .env
      #     php artisan key:generate
      #     php artisan test

      - name: Check required secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          missing=0
          for name in SSH_PRIVATE_KEY SSH_HOST SSH_USER SSH_PORT DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error::Repository secret '$name' is empty or not set."
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Add the missing secrets under Settings → Secrets and variables → Actions → Repository secrets."
            exit 1
          fi

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Per-host SSH config so rsync + ssh share the key, port, and options.
          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName $SSH_HOST
            User ${{ secrets.SSH_USER }}
            Port $SSH_PORT
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

          # Best-effort known_hosts seed. Must not abort the job if Hostinger
          # doesn't answer keyscan — StrictHostKeyChecking=accept-new covers us.
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Fail loudly here (not mid-deploy) if auth/connectivity is wrong.
          ssh -o ConnectTimeout=15 deploy-target 'echo "SSH OK on $(hostname)"; php -v | head -n1'

      - name: Deploy with rsync
        run: |
          rsync -azr --delete \
            -e "ssh" \
            --exclude-from='.deploy-excludes' \
            ./ "deploy-target:${{ secrets.DEPLOY_PATH }}/"

      - name: Rebuild caches on server
        run: |
          ssh deploy-target \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             php artisan storage:link || true && \
             php artisan config:cache && \
             php artisan route:cache && \
             php artisan view:cache"
